<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Trips</title>
<link rel="stylesheet" href="styles.css" />
<style>
  .trips-wrap { max-width: 880px; margin: 0 auto; padding: 24px 20px; }
  .trips-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; }
  .trips-head h1 { margin: 0; font-size: 22px; }
  .trips-section h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin: 22px 0 8px; }
  .trip-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
  .trip-card { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; }
  .trip-card[data-href] { cursor: pointer; transition: border-color 0.1s, background 0.1s; }
  .trip-card[data-href]:hover { border-color: var(--accent); background: var(--panel-2); }
  .trip-card .trip-name { font-weight: 600; color: var(--text); }
  .trip-meta-line { color: var(--muted); font-size: 13px; }
  .trip-actions { display: flex; gap: 6px; }
  .trip-actions button { background: transparent; border: 1px solid var(--line); color: var(--muted); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .trip-actions button:hover { color: var(--text); }
  .trip-actions button.danger:hover { color: #b12a48; border-color: #b12a48; }
  .empty { color: var(--muted); font-style: italic; padding: 8px 0; }
  .new-trip-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: end; padding: 14px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; margin-bottom: 12px; }
  .new-trip-form label { display: flex; flex-direction: column; font-size: 12px; color: var(--muted); gap: 4px; }
  .new-trip-form input { padding: 6px 8px; border: 1px solid var(--line); border-radius: 4px; font-size: 14px; }
  .new-trip-form button { padding: 7px 14px; background: var(--accent); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }

  .view-toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .view-toggle button { background: var(--panel); border: none; color: var(--muted); padding: 6px 12px; font-size: 13px; cursor: pointer; }
  .view-toggle button + button { border-left: 1px solid var(--line); }
  .view-toggle button.active { background: var(--accent); color: #fff; }

  .calendar-wrap { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; margin-bottom: 14px; }
  .cal-month-title { margin: 0 0 10px; font-size: 16px; }
  .cal-empty { color: var(--muted); font-style: italic; padding: 20px; text-align: center; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 4px; overflow: hidden; }
  .cal-dow { background: var(--panel-2); color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; padding: 6px 8px; text-align: center; }
  .cal-day { background: var(--panel); min-height: 64px; padding: 4px 0; position: relative; font-size: 12px; }
  .cal-day.other-month { background: var(--panel-2); color: var(--muted); }
  .cal-day.today .cal-day-num { background: var(--accent); color: #fff; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; }
  .cal-day-num { display: inline-block; margin: 0 6px; }
  .cal-trip { display: block; margin: 2px 4px 0; padding: 2px 6px; color: #fff; font-size: 11px; border-radius: 3px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-decoration: none; }
  .cal-trip:hover { filter: brightness(1.1); }
  /* Bars that continue from the previous cell extend left to bridge the
     grid gap and cell padding, and drop their left rounding. */
  .cal-trip.continued { margin-left: -1px; padding-left: 11px; border-top-left-radius: 0; border-bottom-left-radius: 0; }
  /* Bars that continue into the next cell do the same on the right. */
  .cal-trip.continues { margin-right: -1px; padding-right: 11px; border-top-right-radius: 0; border-bottom-right-radius: 0; }
  .cal-trip.bg-indigo  { background: #6c8cff; }
  .cal-trip.bg-teal    { background: #2dd4bf; }
  .cal-trip.bg-amber   { background: #f59e0b; }
  .cal-trip.bg-rose    { background: #fb7185; }
  .cal-trip.bg-emerald { background: #34d399; }
  .cal-trip.bg-violet  { background: #a78bfa; }
  .cal-trip.bg-grey    { background: #b9bec7; }
  .cal-trip.bg-accent  { background: var(--accent); }
</style>
</head>
<body>
  <div class="trips-wrap">
    <div class="trips-head">
      <h1>Trips</h1>
      <div class="view-toggle" id="view-toggle">
        <button data-view="list" class="active">List</button>
        <button data-view="calendar">Calendar</button>
      </div>
    </div>

    <form id="new-trip-form" class="new-trip-form">
      <label>Name<input id="nt-name" type="text" placeholder="e.g. Iceland 2027" required /></label>
      <label>Start<input id="nt-start" type="date" /></label>
      <label>End<input id="nt-end" type="date" /></label>
      <button type="submit">+ New trip</button>
    </form>

    <div id="list-view">
      <section class="trips-section">
        <h2>Upcoming &amp; current</h2>
        <ul id="upcoming-list" class="trip-list"></ul>
      </section>

      <section class="trips-section">
        <h2>Past</h2>
        <ul id="past-list" class="trip-list"></ul>
      </section>

    </div>

    <div id="calendar-view" hidden>
      <div id="calendar-months"></div>
    </div>
  </div>

<script>
const REGISTRY_KEY = "trip-builder-trips";
const TRIP_KEY_PREFIX = "trip-builder-trip-";
const LEGACY_KEY = "trip-builder-v7";

function readRegistry() {
  try { return JSON.parse(localStorage.getItem(REGISTRY_KEY) || "[]"); }
  catch (e) { return []; }
}
function writeRegistry(list) {
  localStorage.setItem(REGISTRY_KEY, JSON.stringify(list));
}
function newTripId() {
  return "t" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// One-time cleanup: drop location-lane events that fall entirely before the
// first flight or entirely after the last flight (the "you are at home"
// bookend cities like Vancouver/Seattle from the original Zanzibar seed).
const BOOKEND_CLEANUP_KEY = "trip-builder-bookend-cleanup-v1";
function cleanupBookendsOnce() {
  if (localStorage.getItem(BOOKEND_CLEANUP_KEY)) return;
  const list = readRegistry();
  for (const t of list) {
    try {
      const raw = localStorage.getItem(TRIP_KEY_PREFIX + t.id);
      if (!raw) continue;
      const blob = JSON.parse(raw);
      if (!Array.isArray(blob.events) || blob.events.length === 0) continue;
      const flights = blob.events.filter(e =>
        e.lane === "flights" && !(e.title || "").endsWith("layover"));
      if (flights.length === 0) continue;
      const firstStart = flights.reduce((a, e) => e.start < a ? e.start : a, flights[0].start);
      const lastEnd    = flights.reduce((a, e) => e.end   > a ? e.end   : a, flights[0].end);
      blob.events = blob.events.filter(e => {
        if (e.lane !== "location") return true;
        // A bookend "starting city" ends on or before the first flight's
        // departure day; a "ending city" starts on or after the last
        // flight's arrival day.
        if (e.end   <= firstStart) return false;
        if (e.start >= lastEnd)    return false;
        return true;
      });
      localStorage.setItem(TRIP_KEY_PREFIX + t.id, JSON.stringify(blob));
    } catch (e) { /* ignore */ }
  }
  localStorage.setItem(BOOKEND_CLEANUP_KEY, "1");
}

// Migrate any legacy single-trip blob on first visit so it shows up in the list.
(function migrateLegacy() {
  const legacy = localStorage.getItem(LEGACY_KEY);
  if (!legacy) return;
  try {
    const parsed = JSON.parse(legacy);
    const id = newTripId();
    localStorage.setItem(TRIP_KEY_PREFIX + id, legacy);
    const list = readRegistry();
    list.push({
      id,
      name: parsed.name || "Untitled trip",
      start: parsed.start || null,
      end: parsed.end || null,
    });
    writeRegistry(list);
    localStorage.removeItem(LEGACY_KEY);
  } catch (e) { /* ignore */ }
})();

function fmtRange(t) {
  if (!t.start && !t.end) return "No dates set";
  if (t.start && t.end) return `${t.start} → ${t.end}`;
  return t.start || t.end;
}

function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

function isPast(t) {
  return t.end && t.end < todayStr();
}

function render() {
  const list = readRegistry();
  const upcoming = list.filter(t => !isPast(t));
  const past = list.filter(t => isPast(t));

  const ul1 = document.getElementById("upcoming-list");
  const ul2 = document.getElementById("past-list");
  ul1.innerHTML = "";
  ul2.innerHTML = "";

  function row(t) {
    const li = document.createElement("li");
    li.className = "trip-card";
    li.dataset.href = `index.html?trip=${encodeURIComponent(t.id)}`;
    li.innerHTML = `
      <div>
        <span class="trip-name"></span>
        <div class="trip-meta-line"></div>
      </div>
      <div class="trip-actions">
        <button data-action="rename">Rename</button>
        <button data-action="delete" class="danger">Delete</button>
      </div>
    `;
    li.querySelector(".trip-name").textContent = t.name || "Untitled trip";
    li.querySelector(".trip-meta-line").textContent = fmtRange(t);
    li.addEventListener("click", (e) => {
      if (e.target.closest("button")) return;
      window.location.href = li.dataset.href;
    });
    li.querySelector('[data-action="rename"]').addEventListener("click", () => {
      const next = prompt("Rename trip:", t.name || "");
      if (next == null) return;
      const all = readRegistry();
      const i = all.findIndex(x => x.id === t.id);
      if (i < 0) return;
      all[i].name = next.trim() || all[i].name;
      writeRegistry(all);
      // Keep per-trip blob in sync.
      try {
        const raw = localStorage.getItem(TRIP_KEY_PREFIX + t.id);
        if (raw) {
          const parsed = JSON.parse(raw);
          parsed.name = all[i].name;
          localStorage.setItem(TRIP_KEY_PREFIX + t.id, JSON.stringify(parsed));
        }
      } catch (e) { /* ignore */ }
      render();
    });
    li.querySelector('[data-action="delete"]').addEventListener("click", () => {
      if (!confirm(`Delete "${t.name}"? This can't be undone.`)) return;
      const all = readRegistry().filter(x => x.id !== t.id);
      writeRegistry(all);
      localStorage.removeItem(TRIP_KEY_PREFIX + t.id);
      render();
    });
    return li;
  }

  if (upcoming.length === 0) ul1.innerHTML = '<li class="empty">No upcoming trips yet — create one above.</li>';
  else upcoming.forEach(t => ul1.appendChild(row(t)));

  if (past.length === 0) ul2.innerHTML = '<li class="empty">No past trips.</li>';
  else past.forEach(t => ul2.appendChild(row(t)));
}

// --- calendar view ---

const VIEW_KEY = "trip-builder-trips-view";

let currentView = localStorage.getItem(VIEW_KEY) || "list";

function parseISO(s) {
  if (!s) return null;
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function fmtISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}
function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function setView(v) {
  currentView = v;
  localStorage.setItem(VIEW_KEY, v);
  document.querySelectorAll("#view-toggle button").forEach(b => {
    b.classList.toggle("active", b.dataset.view === v);
  });
  document.getElementById("list-view").hidden = v !== "list";
  document.getElementById("calendar-view").hidden = v !== "calendar";
  if (v === "calendar") renderCalendar();
}

function readTripBlob(id) {
  try { return JSON.parse(localStorage.getItem(TRIP_KEY_PREFIX + id) || "null"); }
  catch (e) { return null; }
}

function renderCalendar() {
  const trips = readRegistry().filter(t => t.start && t.end);
  const container = document.getElementById("calendar-months");
  container.innerHTML = "";

  if (trips.length === 0) {
    const empty = document.createElement("div");
    empty.className = "cal-empty";
    empty.textContent = "No trips with dates yet — create one to see it on the calendar.";
    container.appendChild(empty);
    return;
  }

  // Pre-load each trip's location-lane events so we can label calendar cells
  // with the actual place names from the timeline view. Also chain back-to-back
  // flights into a single pill so a connection like YVR-FRA-ZNZ stays visually
  // continuous across the calendar instead of stacking on the layover day.
  const tripLocations = {};
  const tripFlightChains = {};
  trips.forEach(t => {
    const blob = readTripBlob(t.id);
    const events = blob?.events || [];
    tripLocations[t.id] = events.filter(e => e.lane === "location");
    const flights = events.filter(e =>
      e.lane === "flights" && !(e.title || "").endsWith("layover"));
    tripFlightChains[t.id] = chainFlights(flights);
  });

  const monthSet = new Set();
  trips.forEach(t => {
    const s = parseISO(t.start);
    const e = parseISO(t.end);
    let cur = new Date(s.getFullYear(), s.getMonth(), 1);
    const last = new Date(e.getFullYear(), e.getMonth(), 1);
    while (cur <= last) {
      monthSet.add(`${cur.getFullYear()}-${String(cur.getMonth() + 1).padStart(2, "0")}`);
      cur = new Date(cur.getFullYear(), cur.getMonth() + 1, 1);
    }
  });

  const months = [...monthSet].sort().map(s => {
    const [y, m] = s.split("-").map(Number);
    return new Date(y, m - 1, 1);
  });

  months.forEach(monthDate => container.appendChild(renderMonth(monthDate, trips, tripLocations, tripFlightChains)));
}

// Pull "YVR" / "ZNZ" airport codes out of a flight title like "LH493 YVR → FRA".
function extractFlightCodes(title) {
  if (!title) return null;
  const m = title.match(/\b([A-Z]{3})\s*(?:→|->|-|–)\s*([A-Z]{3})\b/);
  return m ? { from: m[1], to: m[2] } : null;
}

// Group flights into chains where each next flight starts on or before the
// previous chain's last leg ends (a connection on the same day).
function chainFlights(flights) {
  if (!flights.length) return [];
  const sorted = [...flights].sort((a, b) => {
    if (a.start !== b.start) return a.start.localeCompare(b.start);
    return (a.startTime || "00:00").localeCompare(b.startTime || "00:00");
  });
  const chains = [];
  let cur = null;
  for (const f of sorted) {
    if (!cur) { cur = { flights: [f], start: f.start, end: f.end, color: f.color }; continue; }
    if (f.start <= cur.end) {
      cur.flights.push(f);
      if (f.end > cur.end) cur.end = f.end;
    } else {
      chains.push(cur);
      cur = { flights: [f], start: f.start, end: f.end, color: f.color };
    }
  }
  if (cur) chains.push(cur);
  for (const c of chains) {
    const codes = c.flights.map(f => extractFlightCodes(f.title)).filter(Boolean);
    if (codes.length) {
      c.from = codes[0].from;
      c.to = codes[codes.length - 1].to;
      const stops = [codes[0].from];
      codes.forEach(co => { if (stops[stops.length - 1] !== co.to) stops.push(co.to); });
      c.label = stops.length === 2 ? `${stops[0]}–${stops[1]}` : `${c.from}–${c.to}`;
      c.tooltip = stops.join(" → ");
    } else {
      c.label = c.flights[0].title || "Flight";
      c.tooltip = c.flights.map(f => f.title).join(" · ");
    }
  }
  return chains;
}

const KNOWN_COLORS = new Set(["indigo","teal","amber","rose","emerald","violet","grey"]);
function colorClass(c) {
  return KNOWN_COLORS.has(c) ? `bg-${c}` : "bg-accent";
}

function renderMonth(monthDate, trips, tripLocations, tripFlightChains) {
  const year = monthDate.getFullYear();
  const month = monthDate.getMonth();
  const today = new Date();

  const wrap = document.createElement("div");
  wrap.className = "calendar-wrap";
  const title = document.createElement("h3");
  title.className = "cal-month-title";
  title.textContent = monthDate.toLocaleString(undefined, { month: "long", year: "numeric" });
  wrap.appendChild(title);

  const grid = document.createElement("div");
  grid.className = "cal-grid";

  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d => {
    const h = document.createElement("div");
    h.className = "cal-dow";
    h.textContent = d;
    grid.appendChild(h);
  });

  const firstOfMonth = new Date(year, month, 1);
  const gridStart = addDays(firstOfMonth, -firstOfMonth.getDay());

  for (let i = 0; i < 42; i++) {
    const day = addDays(gridStart, i);
    const cell = document.createElement("div");
    cell.className = "cal-day";
    if (day.getMonth() !== month) cell.classList.add("other-month");
    if (sameDay(day, today)) cell.classList.add("today");

    const num = document.createElement("span");
    num.className = "cal-day-num";
    num.textContent = day.getDate();
    cell.appendChild(num);

    const dayISO = fmtISO(day);
    const dow = day.getDay();
    trips.forEach(t => {
      if (dayISO < t.start || dayISO > t.end) return;
      const isWeekStart = dow === 0;
      const locs = (tripLocations[t.id] || []).filter(e => dayISO >= e.start && dayISO <= e.end);
      const chains = (tripFlightChains[t.id] || []).filter(c => dayISO >= c.start && dayISO <= c.end);

      // Preferred labels in order: a flight chain that touches this day
      // (transit days are dominated by the flight, and chained connections
      // render as one continuous pill rather than stacking on the layover
      // day), then "Where" events, then a trip-name fallback so the trip
      // is still visible on bare days.
      let items;
      if (chains.length > 0) {
        items = chains.map(c => ({
          label: c.label,
          start: c.start,
          end: c.end,
          color: c.color || "indigo",
          href: `index.html?trip=${encodeURIComponent(t.id)}`,
          tooltip: `${c.tooltip} — ${t.name}`,
        }));
      } else if (locs.length > 0) {
        items = locs.map(e => ({
          label: e.title,
          start: e.start,
          end: e.end,
          color: e.color || "violet",
          href: `index.html?trip=${encodeURIComponent(t.id)}`,
          tooltip: `${e.title} — ${t.name} (${e.start}${e.end !== e.start ? ` → ${e.end}` : ""})`,
        }));
      } else {
        items = [{
          label: t.name || "Untitled",
          start: t.start,
          end: t.end,
          color: "accent",
          href: `index.html?trip=${encodeURIComponent(t.id)}`,
          tooltip: `${t.name || "Untitled"} (${t.start} → ${t.end})`,
        }];
      }

      items.forEach(item => {
        const bar = document.createElement("a");
        bar.className = `cal-trip ${colorClass(item.color)}`;
        bar.href = item.href;
        bar.textContent = item.label;
        bar.title = item.tooltip;
        if (dayISO !== item.start && !isWeekStart) bar.classList.add("continued");
        if (dayISO !== item.end && dow !== 6) bar.classList.add("continues");
        cell.appendChild(bar);
      });
    });

    grid.appendChild(cell);
  }

  wrap.appendChild(grid);
  return wrap;
}

document.getElementById("view-toggle").addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-view]");
  if (!btn) return;
  setView(btn.dataset.view);
});
document.getElementById("new-trip-form").addEventListener("submit", (e) => {
  e.preventDefault();
  const name = document.getElementById("nt-name").value.trim();
  const start = document.getElementById("nt-start").value || null;
  const end = document.getElementById("nt-end").value || null;
  if (!name) return;
  const id = newTripId();
  const list = readRegistry();
  list.push({ id, name, start, end });
  writeRegistry(list);
  // Seed the per-trip blob so the editor finds something to load.
  localStorage.setItem(TRIP_KEY_PREFIX + id, JSON.stringify({
    name, start, end,
    tzAware: true,
    events: [],
    options: [],
    activeView: "main",
    shrunkDays: [],
  }));
  window.location.href = `index.html?trip=${encodeURIComponent(id)}`;
});

cleanupBookendsOnce();
render();
setView(currentView);
</script>
</body>
</html>
